<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>관리자 페이지 - 하위 카테고리 가이드</title>
<style>
body { background: #1a1a1a; color: white; padding: 20px; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; }
.box { max-width: 600px; width: 100%; background: #2a2a2a; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; margin-bottom: 20px; }
input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; display: block; box-sizing: border-box; border-radius: 6px; border: 1px solid #444; background: #333; color: white; font-size: 16px; }
textarea { height: 200px; }
button { width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 16px; margin-top: 10px; }
button:hover { background: #357abd; }
#adminContent, #resultArea { display: none; }
.login-box { text-align: center; }
label { font-size: 0.85em; color: #aaa; margin-top: 10px; display: block; font-weight: bold; }
pre { background: #000; padding: 15px; border-radius: 6px; color: #0f0; overflow-x: auto; font-size: 13px; border: 1px solid #444; margin-bottom: 10px; }
.copy-btn { background: #28a745; margin-bottom: 10px; }
.copy-btn:hover { background: #218838; }
.hint { font-size: 0.8em; color: #4a90e2; margin-top: 2px; margin-bottom: 10px; font-weight: bold; line-height: 1.4; }
.adult-check { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #331a1a; padding: 12px; border-radius: 6px; border: 1px solid #552222; margin: 10px 0; }
</style>
</head>
<body>

<div id="loginSection" class="box login-box">
<h2>관리자 인증</h2>
<input type="password" id="passInput" placeholder="비밀번호 입력">
<button onclick="checkPass()">로그인</button>
</div>

<div id="adminContent" class="box">
<h2>✍️ 새 포스트 작성</h2>
<label>파일 이름 (예: aa-03)</label>
<input type="text" id="fileName">

<label>글 제목</label>
<input type="text" id="title">

<label>상위 카테고리 (Parent)</label>
<select id="parent" onchange="updateHint()">
<option value="소설">소설</option>
<option value="원작">원작</option>
<option value="끄적끄적">끄적끄적</option>
</select>

<label>하위 카테고리 (시리즈 이름)</label>
<div id="subHint" class="hint">추천: 목록을 불러오는 중...</div>
<input type="text" id="sub" list="subList" placeholder="시리즈 이름을 쓰거나 고르세요">
<datalist id="subList"></datalist>

<label>날짜</label>
<input type="date" id="date">

<label class="adult-check">
  <input type="checkbox" id="isAdult" style="width: auto; margin: 0;"> 
  <span style="color: #ff6666; font-weight: bold;">🔞 성인용 콘텐츠 (체크 시 제목에 자동 추가)</span>
</label>

<label>본문 내용</label>
<textarea id="content"></textarea>

<button onclick="go()">🚀 파일 생성 및 코드 추출</button>
</div>

<div id="resultArea" class="box">
<h3 style="color: #4a90e2; margin-top: 0;">✅ 파일 다운로드 완료!</h3>
<pre id="indexCode"></pre>
<button id="btnCopy" class="copy-btn" onclick="copyCode()">📋 코드 복사하기</button>
<button onclick="resetForm()" style="background: #555;">새 글 작성하러 가기</button>
</div>

<script>
const menuData = {
"소설": ["5/10", "성간운"],
"원작": ["23.5", "APPLE", "Bake Love Feelings", "Chasing Love", "CRUSH", "Dangerous Queen", "Denied Love", "Ditto", "Dream", "Enemies With Benefits", "MATE", "Moon Shadow", "Pluto", "Poisonous Love", "Queendom", "Reverse 4 You", "Reverse with Me", "Roller coaster", "The Air", "The Earth", "The Fire", "The Water", "US", "Visual", "Whale Store XOXO"],
"끄적끄적": ["잡담"]
};

function updateHint() {
const p = document.getElementById('parent').value;
const hintBox = document.getElementById('subHint');
const dataList = document.getElementById('subList');
const subs = menuData[p] || [];
hintBox.innerText = "추천: " + subs.join(", ");
dataList.innerHTML = "";
subs.forEach(s => {
const opt = document.createElement('option');
opt.value = s;
dataList.appendChild(opt);
});
}

function resetForm() {
document.getElementById('resultArea').style.display = 'none';
document.getElementById('adminContent').style.display = 'block';
document.getElementById('fileName').value = "";
document.getElementById('title').value = "";
document.getElementById('sub').value = "";
document.getElementById('content').value = "";
document.getElementById('isAdult').checked = false;
window.scrollTo(0, 0);
}

window.onload = () => {
document.getElementById('date').value = new Date().toISOString().substring(0, 10);
updateHint();
};

function checkPass() {
if (document.getElementById('passInput').value === "1234") {
document.getElementById('loginSection').style.display = 'none';
document.getElementById('adminContent').style.display = 'block';
document.body.style.alignItems = 'flex-start';
} else { alert("비밀번호가 틀렸습니다!"); }
}

function dl(n, t) {
const a = document.createElement('a');
a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(t);
a.download = n;
a.click();
}

function go() {
const f = document.getElementById('fileName').value.trim();
let t = document.getElementById('title').value.trim();
const d = document.getElementById('date').value;
const p = document.getElementById('parent').value;
const s = document.getElementById('sub').value.trim();
const c = document.getElementById('content').value;
const isAdult = document.getElementById('isAdult').checked;

if(!f || !t || !s) return alert("다 입력해주세요!");

// 성인용 체크 시 제목 앞에 🔞 추가
if(isAdult && !t.includes("🔞")) {
  t = "🔞 " + t;
}

const json = { "title": t, "date": d, "category": "diary", "parent": p, "sub": s, "text": "posts/" + f + ".txt" };
const indexEntry = { "title": t, "date": d, "category": "diary", "parent": p, "sub": s, "file": f };
const codeText = JSON.stringify(indexEntry, null, 2) + ",";
dl(f + ".json", JSON.stringify(json, null, 2));
dl(f + ".txt", c);
document.getElementById('indexCode').innerText = codeText;
document.getElementById('adminContent').style.display = 'none';
document.getElementById('resultArea').style.display = 'block';
window.scrollTo(0, 0);
}

function copyCode() {
const code = document.getElementById('indexCode').innerText;
navigator.clipboard.writeText(code).then(() => {
const btn = document.getElementById('btnCopy');
btn.innerText = "✅ 복사되었습니다!";
setTimeout(() => { btn.innerText = "📋 코드 복사하기"; }, 2000);
});
}
</script>
</body>
</html>
