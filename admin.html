<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>관리자 페이지 - 편집 도구 개선</title>
<style>
body { background: #1a1a1a; color: white; padding: 20px; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; }
.box { max-width: 600px; width: 100%; background: #2a2a2a; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; margin-bottom: 20px; }
input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; display: block; box-sizing: border-box; border-radius: 6px; border: 1px solid #444; background: #333; color: white; font-size: 16px; }
textarea { height: 400px; font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; }
button { width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 16px; margin-top: 10px; }
button:hover { background: #357abd; }
#adminContent, #resultArea { display: none; }
.login-box { text-align: center; }
label { font-size: 0.85em; color: #aaa; margin-top: 10px; display: block; font-weight: bold; }
pre { background: #000; padding: 15px; border-radius: 6px; color: #0f0; overflow-x: auto; font-size: 13px; border: 1px solid #444; margin-bottom: 10px; }
.copy-btn { background: #28a745; margin-bottom: 10px; }
.copy-btn:hover { background: #218838; }
.hint { font-size: 0.8em; color: #4a90e2; margin-top: 2px; margin-bottom: 10px; font-weight: bold; line-height: 1.4; }
.adult-check { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #331a1a; padding: 12px; border-radius: 6px; border: 1px solid #552222; margin: 10px 0; }

.edit-tools { background: #333; padding: 15px; border-radius: 8px; border: 1px solid #444; margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
.tool-row { display: flex; gap: 8px; }
.img-input-group { flex: 1; }
.edit-tools input { margin: 0; font-size: 14px; }
.btn-img { background: #666; font-size: 14px; padding: 10px; width: 130px; margin: 0; }
.btn-center { background: #9b59b6; font-size: 14px; padding: 10px; width: 100%; margin: 0; }
.btn-center:hover { background: #8e44ad; }

/* 말풍선 버튼 스타일 (간격 여유 버전) */
.btn-talk-left { background: #555; font-size: 13px; padding: 10px; flex: 1; margin: 0; }
.btn-talk-right { background: #2c3e50; font-size: 13px; padding: 10px; flex: 1; margin: 0; border: 1px solid #4a90e2; }
</style>
</head>
<body>

<div id="loginSection" class="box login-box">
<h2>관리자 인증</h2>
<input type="password" id="passInput" placeholder="비밀번호 입력">
<button onclick="checkPass()">로그인</button>
</div>

<div id="adminContent" class="box">
<h2>✍️ 새 포스트 작성</h2>
<label>파일 이름 (예: aa-03)</label>
<input type="text" id="fileName">

<label>글 제목</label>
<input type="text" id="title">

<label>상위 카테고리 (Parent)</label>
<select id="parent" onchange="updateHint()">
<option value="소설">소설</option>
<option value="원작">원작</option>
<option value="끄적끄적">끄적끄적</option>
</select>

<label>하위 카테고리 (시리즈 이름)</label>
<div id="subHint" class="hint">추천: 목록을 불러오는 중...</div>
<input type="text" id="sub" list="subList" placeholder="시리즈 이름을 쓰거나 고르세요">
<datalist id="subList"></datalist>

<label>날짜</label>
<input type="date" id="date">

<label class="adult-check">
  <input type="checkbox" id="isAdult" style="width: auto; margin: 0;"> 
  <span style="color: #ff6666; font-weight: bold;">🔞 성인용 콘텐츠 (체크 시 제목에 자동 추가)</span>
</label>

<div class="edit-tools">
  <label style="margin-top:0; color:#4a90e2;">🛠️ 편집 도구</label>
  <div class="tool-row">
    <div class="img-input-group">
      <input type="text" id="midImgUrl" placeholder="이미지 주소 붙여넣기">
    </div>
    <button type="button" class="btn-img" onclick="insertImage()">🖼️ 사진 삽입</button>
  </div>
  <button type="button" class="btn-center" onclick="insertCenter()">↔️ 선택 영역 가운데 정렬</button>
  
  <div class="tool-row">
    <button type="button" class="btn-talk-left" onclick="insertTalk('left')">🗨️ 상대방 (왼쪽)</button>
    <button type="button" class="btn-talk-right" onclick="insertTalk('right')">🗨️ 나 (오른쪽)</button>
  </div>
</div>

<label>본문 내용</label>
<textarea id="content" placeholder="글 내용을 작성하세요."></textarea>

<button onclick="go()">🚀 파일 생성 및 코드 추출</button>
</div>

<div id="resultArea" class="box">
<h3 style="color: #4a90e2; margin-top: 0;">✅ 파일 다운로드 완료!</h3>
<pre id="indexCode"></pre>
<button id="btnCopy" class="copy-btn" onclick="copyCode()">📋 코드 복사하기</button>
<button onclick="resetForm()" style="background: #555;">새 글 작성하러 가기</button>
</div>

<script>
const menuData = {
"소설": ["5/10", "길잡이", "성간운"],
"원작": ["23.5", "APPLE", "Bake Love Feelings", "Chasing Love", "CRUSH", "Dangerous Queen", "Denied Love", "Ditto", "Dream", "Enemies With Benefits", "Harmony Secret", "MATE", "Moon Shadow", "Pluto", "Poisonous Love", "Queendom", "Reverse 4 You", "Reverse with Me", "Roller coaster", "The Air", "The Earth", "The Fire", "The Water", "US", "Visual", "Whale Store XOXO"],
"끄적끄적": ["잡담"]
};

function insertImage() {
  let url = document.getElementById('midImgUrl').value.trim();
  const textarea = document.getElementById('content');
  if(!url) return alert("이미지 주소를 입력해주세요!");
  if(url.includes("github.com") && url.includes("/blob/")) {
    url = url.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
  }
  const imgTag = `<img src="${url}" style="width:100%; border-radius:8px; margin:20px 0;">`;
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  textarea.value = textarea.value.substring(0, start) + imgTag + textarea.value.substring(end);
  document.getElementById('midImgUrl').value = ""; 
  textarea.focus();
}

function insertCenter() {
  const textarea = document.getElementById('content');
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const selectedText = textarea.value.substring(start, end);
  if (start === end) return alert("정렬할 내용을 드래그해주세요!");
  const centerTag = `<div style="text-align: center;">${selectedText}</div>`;
  textarea.value = textarea.value.substring(0, start) + centerTag + textarea.value.substring(end);
  textarea.focus();
}

function insertTalk(type) {
  const textarea = document.getElementById('content');
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const selectedText = textarea.value.substring(start, end) || "내용 입력";
  
  let talkTag = "";
  if(type === 'left') {
    // 여유로운 간격을 위해 margin 5px로 설정
    talkTag = `<div style="display: flex; justify-content: flex-start; margin: 5px 0;"><div style="background: #333; color: white; padding: 8px 12px; border-radius: 15px; border-top-left-radius: 2px; max-width: 70%;">${selectedText}</div></div>`;
  } else {
    talkTag = `<div style="display: flex; justify-content: flex-end; margin: 5px 0;"><div style="background: #4a90e2; color: white; padding: 8px 12px; border-radius: 15px; border-top-right-radius: 2px; max-width: 70%;">${selectedText}</div></div>`;
  }
  
  textarea.value = textarea.value.substring(0, start) + talkTag + textarea.value.substring(end);
  textarea.focus();
}

function updateHint() {
  const p = document.getElementById('parent').value;
  const hintBox = document.getElementById('subHint');
  const dataList = document.getElementById('subList');
  const subs = menuData[p] || [];
  hintBox.innerText = "추천: " + subs.join(", ");
  dataList.innerHTML = "";
  subs.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    dataList.appendChild(opt);
  });
}

function resetForm() {
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('adminContent').style.display = 'block';
  document.getElementById('fileName').value = "";
  document.getElementById('title').value = "";
  document.getElementById('sub').value = "";
  document.getElementById('content').value = "";
  document.getElementById('midImgUrl').value = "";
  document.getElementById('isAdult').checked = false;
  window.scrollTo(0, 0);
}

window.onload = () => {
  document.getElementById('date').value = new Date().toISOString().substring(0, 10);
  updateHint();
};

function checkPass() {
  if (document.getElementById('passInput').value === "1234") {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    document.body.style.alignItems = 'flex-start';
  } else { alert("비밀번호가 틀렸습니다!"); }
}

function dl(n, t) {
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(t);
  a.download = n;
  a.click();
}

function go() {
  const f = document.getElementById('fileName').value.trim();
  let t = document.getElementById('title').value.trim();
  const d = document.getElementById('date').value;
  const p = document.getElementById('parent').value;
  const s = document.getElementById('sub').value.trim();
  const c = document.getElementById('content').value;
  const isAdult = document.getElementById('isAdult').checked;
  if(!f || !t || !s) return alert("다 입력해주세요!");
  if(isAdult && !t.includes("🔞")) t = "🔞 " + t;
  const json = { "title": t, "date": d, "category": "diary", "parent": p, "sub": s, "text": "posts/" + f + ".txt", "images": [] };
  const indexEntry = { "title": t, "date": d, "category": "diary", "parent": p, "sub": s, "file": f };
  const codeText = JSON.stringify(indexEntry, null, 2) + ",";
  dl(f + ".json", JSON.stringify(json, null, 2));
  dl(f + ".txt", c);
  document.getElementById('indexCode').innerText = codeText;
  document.getElementById('adminContent').style.display = 'none';
  document.getElementById('resultArea').style.display = 'block';
  window.scrollTo(0, 0);
}

function copyCode() {
  const code = document.getElementById('indexCode').innerText;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.innerText = "✅ 복사되었습니다!";
    setTimeout(() => { btn.innerText = "📋 코드 복사하기"; }, 2000);
  });
}
</script>
</body>
</html>
